<section id="quatation" class="contact-form-container-form">
    <div class="next-section-form contact-form-container">
        <h2 class="contact-form-container__title">Wyceń sufit napinany</h2>



       <form id="telegramForm" class="contact-form contact-form-color" action="#" method="POST">
    <label class="contact-form__label" for="name">Imię:</label>
    <input class="contact-form__input" type="text" id="name" name="name" required placeholder="np. Jan Kowalski">

    <label class="contact-form__label" for="phone">Telefon:</label>
    <input class="contact-form__input" type="tel" id="phone" name="phone" placeholder="+48 00000000">

    <label class="contact-form__label" for="sufit">Jaki sufit chcesz?</label>
    <input class="contact-form__input" type="text" id="sufit" name="sufit">

    <label class="contact-form__label" for="size">Powierzchnia pokoju (m²)</label>
    <input class="contact-form__input" type="text" id="size" name="size" placeholder="m²">

    <label class="contact-form__label" for="metr">Metry bieżące (m/b)</label>
    <input class="contact-form__input" type="text" id="metr" name="metr" placeholder="m/b">

    <label class="contact-form__label" for="punkt">Ilość punktów oświetlenia</label>
    <input class="contact-form__input" type="text" id="punkt" name="punkt" placeholder="">

    <button type="submit" class="contact-form__button">Wysłać</button>
</form>
